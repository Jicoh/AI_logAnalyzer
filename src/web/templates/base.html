<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Log Analyzer{% endblock %}</title>
    <link href="{{ url_for('static', filename='css/vendor/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/bootstrap-icons.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="d-flex" style="height: 100vh;">
        <!-- Sidebar -->
        <div class="sidebar bg-dark text-white d-flex flex-column">
            <div class="sidebar-header">
                <span>AI Log Analyzer</span>
                <i class="bi bi-chevron-left sidebar-toggle ms-auto" onclick="toggleSidebar()"></i>
            </div>
            <nav class="sidebar-nav flex-grow-1">
                <a href="{{ url_for('main.index') }}" class="nav-link {% if active_page == 'analyzer' %}active{% endif %}">
                    <i class="bi bi-search"></i> <span>日志分析</span>
                </a>
                <a href="{{ url_for('main.knowledge_base') }}" class="nav-link {% if active_page == 'kb' %}active{% endif %}">
                    <i class="bi bi-database"></i> <span>知识库</span>
                </a>
                <a href="{{ url_for('main.log_metadata') }}" class="nav-link {% if active_page == 'log_metadata' %}active{% endif %}">
                    <i class="bi bi-journal-text"></i> <span>日志规则</span>
                </a>
                <a href="{{ url_for('main.history') }}" class="nav-link {% if active_page == 'history' %}active{% endif %}">
                    <i class="bi bi-clock-history"></i> <span>历史记录</span>
                </a>
            </nav>
            <nav class="sidebar-nav border-top border-secondary">
                <a href="{{ url_for('main.settings') }}" class="nav-link {% if active_page == 'settings' %}active{% endif %}">
                    <i class="bi bi-gear"></i> <span>设置</span>
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content flex-grow-1">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/htmx.min.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/alpine.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
