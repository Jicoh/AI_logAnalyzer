{% extends "base.html" %}

{% block title %}设置 - AI Log Analyzer{% endblock %}

{% block content %}
<div x-data="settingsApp()" x-init="init()">
    <div class="row">
        <div class="col-12">
            <h4 class="mb-4"><i class="bi bi-gear"></i> 系统设置</h4>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <!-- 缓存设置 -->
            <div class="card mb-4">
                <div class="card-header">
                    <i class="bi bi-trash"></i> 缓存清理
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span><i class="bi bi-folder2-open"></i> 缓存文件 (data/temp)</span>
                            <span class="badge bg-secondary" x-text="cacheStats.temp?.size_formatted || '计算中...'"></span>
                        </div>
                        <button class="btn btn-outline-warning btn-sm" @click="clearTemp()">
                            <i class="bi bi-trash3"></i> 清理缓存文件
                        </button>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span><i class="bi bi-folder"></i> 分析结果 (data/analysis_output)</span>
                            <span class="badge bg-secondary" x-text="cacheStats.analysis_output?.size_formatted || '计算中...'"></span>
                        </div>
                        <button class="btn btn-outline-danger btn-sm" @click="clearResults()">
                            <i class="bi bi-trash3"></i> 清理分析结果
                        </button>
                    </div>
                    <small class="text-muted">
                        <i class="bi bi-info-circle"></i>
                        清理操作不可恢复，请谨慎操作
                    </small>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div class="toast" :class="toast.show ? 'show' : ''" role="alert" x-show="toast.show" x-cloak>
            <div class="toast-header"
                :class="{
                    'bg-danger text-white': toast.type === 'error',
                    'bg-warning': toast.type === 'warning',
                    'bg-success text-white': toast.type === 'success'
                }">
                <strong class="me-auto" x-text="toast.title"></strong>
                <button type="button" class="btn-close" :class="toast.type === 'warning' ? '' : 'btn-close-white'" @click="toast.show = false"></button>
            </div>
            <div class="toast-body" x-text="toast.message"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function settingsApp() {
    return {
        cacheStats: {},
        toast: {
            show: false,
            type: 'success',
            title: '',
            message: ''
        },

        init() {
            this.loadCacheStats();
        },

        showToast(type, title, message) {
            this.toast = {
                show: true,
                type: type,
                title: title,
                message: message
            };
            setTimeout(() => {
                this.toast.show = false;
            }, 3000);
        },

        async loadCacheStats() {
            try {
                const response = await fetch('/api/cache/stats');
                const data = await response.json();
                if (data.success) {
                    this.cacheStats = data.data;
                }
            } catch (error) {
                console.error('Failed to load cache stats:', error);
            }
        },

        async clearTemp() {
            if (confirm('确定要清理缓存文件吗？此操作不可恢复！')) {
                try {
                    const response = await fetch('/api/cache/clear-temp', {
                        method: 'POST'
                    });
                    const data = await response.json();
                    if (data.success) {
                        if (data.stats && data.stats.failed > 0) {
                            this.showToast('warning', '清理完成',
                                `删除 ${data.stats.deleted} 个文件，${data.stats.failed} 个失败`);
                        } else {
                            this.showToast('success', '清理成功', data.message);
                        }
                        this.loadCacheStats();
                    } else {
                        this.showToast('error', '清理失败', data.error || '未知错误');
                    }
                } catch (error) {
                    console.error('Failed to clear temp:', error);
                    this.showToast('error', '清理失败', error.message);
                }
            }
        },

        async clearResults() {
            if (confirm('确定要清理分析结果吗？此操作不可恢复！')) {
                try {
                    const response = await fetch('/api/cache/clear-results', {
                        method: 'POST'
                    });
                    const data = await response.json();
                    if (data.success) {
                        if (data.stats && data.stats.failed > 0) {
                            this.showToast('warning', '清理完成',
                                `删除 ${data.stats.deleted} 个文件，${data.stats.failed} 个失败`);
                        } else {
                            this.showToast('success', '清理成功', data.message);
                        }
                        this.loadCacheStats();
                    } else {
                        this.showToast('error', '清理失败', data.error || '未知错误');
                    }
                } catch (error) {
                    console.error('Failed to clear results:', error);
                    this.showToast('error', '清理失败', error.message);
                }
            }
        }
    };
}
</script>

<style>
[x-cloak] { display: none !important; }
</style>
{% endblock %}
