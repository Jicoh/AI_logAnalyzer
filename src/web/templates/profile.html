{% extends "base.html" %}

{% block title %}个人中心 - AI Log Analyzer{% endblock %}

{% block content %}
<div x-data="profileApp()" x-init="init()">
    <div class="row">
        <div class="col-12">
            <h4 class="mb-4"><i class="bi bi-person"></i> 个人中心</h4>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <!-- 用户信息 -->
            <div class="card mb-4">
                <div class="card-header">
                    <i class="bi bi-person-badge"></i> 用户信息
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label text-muted">工号</label>
                        <div class="form-control-plaintext fw-bold" x-text="userInfo.employee_id || '加载中...'"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">身份</label>
                        <div class="form-control-plaintext">
                            <span class="badge" :class="userInfo.is_admin ? 'bg-danger' : 'bg-secondary'"
                                  x-text="userInfo.is_admin ? '管理员' : '普通用户'"></span>
                        </div>
                    </div>
                    <div class="mb-3">
                        <button class="btn btn-outline-danger" @click="logout()">
                            <i class="bi bi-box-arrow-right"></i> 退出登录
                        </button>
                    </div>
                </div>
            </div>

            <!-- 存储配额 -->
            <div class="card mb-4">
                <div class="card-header">
                    <i class="bi bi-hard-drive"></i> 存储空间
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <div class="d-flex justify-content-between mb-2">
                            <span>已使用</span>
                            <span x-text="quotaStatus.used_formatted || '计算中...'"></span>
                        </div>
                        <div class="progress" style="height: 20px;">
                            <div class="progress-bar"
                                 :class="quotaStatus.percent > 80 ? 'bg-danger' : quotaStatus.percent > 60 ? 'bg-warning' : 'bg-success'"
                                 :style="'width: ' + (quotaStatus.percent || 0) + '%'"
                                 x-text="(quotaStatus.percent || 0) + '%'">
                            </div>
                        </div>
                        <small class="text-muted">配额上限：300MB，剩余：<span x-text="quotaStatus.remaining || '300MB'"></span></small>
                    </div>

                    <div class="alert alert-warning" x-show="quotaStatus.percent > 80">
                        <i class="bi bi-exclamation-triangle"></i>
                        存储空间即将用尽，请及时清理缓存
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6">
            <!-- 修改密码 -->
            <div class="card mb-4">
                <div class="card-header">
                    <i class="bi bi-key"></i> 修改密码
                </div>
                <div class="card-body">
                    <form @submit.prevent="changePassword()">
                        <div class="mb-3">
                            <label class="form-label">旧密码</label>
                            <input type="password" class="form-control" x-model="old_password"
                                   placeholder="请输入当前密码" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">新密码</label>
                            <input type="password" class="form-control" x-model="new_password"
                                   placeholder="请输入新密码（至少6个字符）" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">确认新密码</label>
                            <input type="password" class="form-control" x-model="confirm_password"
                                   placeholder="请再次输入新密码" required>
                        </div>

                        <div class="alert alert-danger" x-show="error" x-text="error"></div>
                        <div class="alert alert-success" x-show="success" x-text="success"></div>

                        <button type="submit" class="btn btn-primary" :disabled="loading">
                            <span x-show="loading" class="spinner-border spinner-border-sm"></span>
                            <span x-text="loading ? '修改中...' : '修改密码'"></span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- 意见反馈 -->
            <div class="card mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-chat-dots"></i> 意见反馈</span>
                    <button class="btn btn-primary btn-sm" @click="showFeedbackModal = true">
                        <i class="bi bi-plus"></i> 提交意见
                    </button>
                </div>
                <div class="card-body">
                    <div x-show="myFeedbacks.length === 0" class="text-muted text-center py-3">
                        暂无已提交的意见
                    </div>
                    <div x-show="myFeedbacks.length > 0">
                        <template x-for="fb in myFeedbacks" :key="fb.id">
                            <div class="border rounded p-3 mb-2">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <small class="text-muted" x-text="fb.created_at"></small>
                                    <span class="badge"
                                          :class="fb.status === 'replied' ? 'bg-success' : 'bg-warning'"
                                          x-text="fb.status === 'replied' ? '已回复' : '待处理'"></span>
                                </div>
                                <div class="mb-2" x-text="fb.content"></div>
                                <div x-show="fb.status === 'replied' && fb.admin_reply" class="alert alert-info mb-0">
                                    <strong>管理员回复：</strong>
                                    <span x-text="fb.admin_reply"></span>
                                    <br>
                                    <small class="text-muted" x-text="'回复时间: ' + fb.replied_at"></small>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 提交意见模态框 -->
    <div class="modal" :class="showFeedbackModal ? 'show d-block' : ''" style="background: rgba(0,0,0,0.5);">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">提交意见</h5>
                    <button type="button" class="btn-close" @click="showFeedbackModal = false"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">意见内容</label>
                        <textarea class="form-control" x-model="feedbackContent"
                                  rows="4" placeholder="请输入您的意见或建议..." maxlength="2000"></textarea>
                        <small class="text-muted" x-text="feedbackContent.length + '/2000'"></small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" @click="showFeedbackModal = false">取消</button>
                    <button class="btn btn-primary" @click="submitFeedback()" :disabled="feedbackSubmitting">
                        <span x-show="feedbackSubmitting" class="spinner-border spinner-border-sm"></span>
                        <span x-text="feedbackSubmitting ? '提交中...' : '提交'"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div class="toast" :class="toast.show ? 'show' : ''" role="alert" x-show="toast.show" x-cloak>
            <div class="toast-header"
                :class="{
                    'bg-danger text-white': toast.type === 'error',
                    'bg-warning': toast.type === 'warning',
                    'bg-success text-white': toast.type === 'success'
                }">
                <strong class="me-auto" x-text="toast.title"></strong>
                <button type="button" class="btn-close" :class="toast.type === 'warning' ? '' : 'btn-close-white'" @click="toast.show = false"></button>
            </div>
            <div class="toast-body" x-text="toast.message"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function profileApp() {
    return {
        userInfo: {},
        quotaStatus: {},
        old_password: '',
        new_password: '',
        confirm_password: '',
        loading: false,
        error: '',
        success: '',
        toast: { show: false, type: '', title: '', message: '' },
        showFeedbackModal: false,
        feedbackContent: '',
        feedbackSubmitting: false,
        myFeedbacks: [],

        init() {
            this.loadUserInfo();
            this.loadQuota();
            this.loadMyFeedbacks();
        },

        async loadUserInfo() {
            try {
                const response = await fetch('/api/auth/me');
                const data = await response.json();
                if (data.success) {
                    this.userInfo = data.data;
                }
            } catch (e) {
                console.error('Failed to load user info:', e);
            }
        },

        async loadQuota() {
            try {
                const response = await fetch('/api/cache/stats');
                const data = await response.json();
                if (data.success) {
                    this.quotaStatus = data.data.quota || {};
                }
            } catch (e) {
                console.error('Failed to load quota:', e);
            }
        },

        async loadMyFeedbacks() {
            try {
                const response = await fetch('/api/feedback/my');
                const data = await response.json();
                if (data.success) {
                    this.myFeedbacks = data.data;
                }
            } catch (e) {
                console.error('Failed to load feedbacks:', e);
            }
        },

        showToast(type, title, message) {
            this.toast = { show: true, type, title, message };
            setTimeout(() => { this.toast.show = false; }, 3000);
        },

        async changePassword() {
            this.error = '';
            this.success = '';

            if (this.new_password !== this.confirm_password) {
                this.error = '两次输入的新密码不一致';
                return;
            }

            this.loading = true;

            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        old_password: this.old_password,
                        new_password: this.new_password
                    })
                });

                const data = await response.json();
                if (data.success) {
                    this.success = data.message;
                    this.old_password = '';
                    this.new_password = '';
                    this.confirm_password = '';
                } else {
                    this.error = data.error;
                }
            } catch (e) {
                this.error = '网络错误，请重试';
            } finally {
                this.loading = false;
            }
        },

        async submitFeedback() {
            if (!this.feedbackContent.trim()) {
                this.showToast('error', '错误', '意见内容不能为空');
                return;
            }

            this.feedbackSubmitting = true;

            try {
                const response = await fetch('/api/feedback/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: this.feedbackContent })
                });

                const data = await response.json();
                if (data.success) {
                    this.showToast('success', '成功', '意见已提交');
                    this.showFeedbackModal = false;
                    this.feedbackContent = '';
                    this.loadMyFeedbacks();
                } else {
                    this.showToast('error', '错误', data.error);
                }
            } catch (e) {
                this.showToast('error', '错误', '提交失败，请重试');
            } finally {
                this.feedbackSubmitting = false;
            }
        },

        async logout() {
            if (!confirm('确定要退出登录吗？')) {
                return;
            }
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (e) {
                this.showToast('error', '错误', '退出登录失败');
            }
        }
    };
}
</script>

<style>
.modal.show { display: block; }
[x-cloak] { display: none !important; }
</style>
{% endblock %}
