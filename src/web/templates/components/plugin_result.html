<!-- Independent Plugin Result Display Component -->
<!-- Usage: Include this component and use x-data with pluginResult data -->

<!-- Statistics Overview Template -->
<template id="plugin-stats-template">
    <div class="row mb-3">
        <div class="col-md-4">
            <div class="text-center p-3 bg-light rounded">
                <h3 class="text-danger" x-text="totalErrors"></h3>
                <small class="text-muted">错误总数</small>
            </div>
        </div>
        <div class="col-md-4">
            <div class="text-center p-3 bg-light rounded">
                <h3 class="text-warning" x-text="totalWarnings"></h3>
                <small class="text-muted">警告总数</small>
            </div>
        </div>
        <div class="col-md-4">
            <div class="text-center p-3 bg-light rounded">
                <h3 class="text-info" x-text="totalLines"></h3>
                <small class="text-muted">总行数</small>
            </div>
        </div>
    </div>
</template>

<!-- Single Plugin Result Section Template -->
<template id="plugin-section-template">
    <div class="plugin-section mb-4 border rounded p-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0">
                <i class="bi bi-puzzle"></i>
                <span x-text="pluginResult.plugin_name"></span>
            </h6>
            <div>
                <span class="badge bg-danger me-1" x-show="pluginResult.error_count > 0">
                    <i class="bi bi-x-circle"></i>
                    <span x-text="pluginResult.error_count"></span>
                </span>
                <span class="badge bg-warning me-1" x-show="pluginResult.warning_count > 0">
                    <i class="bi bi-exclamation-triangle"></i>
                    <span x-text="pluginResult.warning_count"></span>
                </span>
            </div>
        </div>

        <!-- Plugin-specific statistics -->
        <div x-show="Object.keys(pluginResult.statistics || {}).length > 0" class="mb-2">
            <small class="text-muted">统计信息:</small>
            <div class="d-flex flex-wrap gap-2 mt-1">
                <template x-for="(value, key) in pluginResult.statistics" :key="key">
                    <span class="badge bg-light text-dark border">
                        <span x-text="formatStatKey(key)"></span>:
                        <span x-text="formatStatValue(value)"></span>
                    </span>
                </template>
            </div>
        </div>

        <!-- Errors for this plugin -->
        <div x-show="pluginResult.errors?.length > 0" class="mt-2">
            <small class="text-danger"><i class="bi bi-x-circle"></i> 错误</small>
            <div class="table-responsive" style="max-height: 150px; overflow-y: auto;">
                <table class="table table-sm table-hover small">
                    <thead class="table-light sticky-top">
                        <tr>
                            <th>行号</th>
                            <th>时间</th>
                            <th>组件</th>
                            <th>消息</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="err in pluginResult.errors" :key="err.line_number + '-' + err.message?.substring(0, 20)">
                            <tr>
                                <td><code x-text="err.line_number"></code></td>
                                <td x-text="err.timestamp || '-'"></td>
                                <td x-text="err.component || '-'"></td>
                                <td><small x-text="truncateText(err.message, 50)"></small></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Warnings for this plugin -->
        <div x-show="pluginResult.warnings?.length > 0" class="mt-2">
            <small class="text-warning"><i class="bi bi-exclamation-triangle"></i> 警告</small>
            <div class="table-responsive" style="max-height: 150px; overflow-y: auto;">
                <table class="table table-sm table-hover small">
                    <thead class="table-light sticky-top">
                        <tr>
                            <th>行号</th>
                            <th>时间</th>
                            <th>组件</th>
                            <th>消息</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="warn in pluginResult.warnings" :key="warn.line_number + '-' + warn.message?.substring(0, 20)">
                            <tr>
                                <td><code x-text="warn.line_number"></code></td>
                                <td x-text="warn.timestamp || '-'"></td>
                                <td x-text="warn.component || '-'"></td>
                                <td><small x-text="truncateText(warn.message, 50)"></small></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</template>

<!--
Component Functions for Alpine.js
Include these functions in your Alpine.js component
-->
<script>
// Helper functions for plugin result display
const pluginResultHelpers = {
    /**
     * Calculate total errors from multi-plugin result
     */
    getTotalErrors(pluginResult) {
        if (!pluginResult?.plugins) return 0;
        return Object.values(pluginResult.plugins).reduce((sum, p) => sum + (p.error_count || 0), 0);
    },

    /**
     * Calculate total warnings from multi-plugin result
     */
    getTotalWarnings(pluginResult) {
        if (!pluginResult?.plugins) return 0;
        return Object.values(pluginResult.plugins).reduce((sum, p) => sum + (p.warning_count || 0), 0);
    },

    /**
     * Calculate total lines from multi-plugin result
     */
    getTotalLines(pluginResult) {
        if (!pluginResult?.plugins) return 0;
        let maxLines = 0;
        Object.values(pluginResult.plugins).forEach(p => {
            if (p.statistics?.total_lines) {
                maxLines = Math.max(maxLines, p.statistics.total_lines);
            }
        });
        return maxLines;
    },

    /**
     * Format statistics key for display
     */
    formatStatKey(key) {
        const keyMap = {
            'total_lines': '总行数',
            'error_lines': '错误行数',
            'warning_lines': '警告行数',
            'info_lines': '信息行数',
            'debug_lines': '调试行数',
            'unique_components': '唯一组件数',
            'time_range': '时间范围',
            'file_size': '文件大小'
        };
        return keyMap[key] || key;
    },

    /**
     * Format statistics value for display
     */
    formatStatValue(value) {
        if (typeof value === 'number') {
            return value.toLocaleString();
        }
        if (typeof value === 'object') {
            return JSON.stringify(value);
        }
        return String(value);
    },

    /**
     * Truncate text with ellipsis
     */
    truncateText(text, maxLength = 50) {
        if (!text) return '';
        if (text.length <= maxLength) return text;
        return text.substring(0, maxLength) + '...';
    },

    /**
     * Get sorted plugin IDs
     */
    getSortedPluginIds(pluginResult) {
        if (!pluginResult?.plugins) return [];
        // Sort by error count descending, then by name
        return Object.keys(pluginResult.plugins).sort((a, b) => {
            const pA = pluginResult.plugins[a];
            const pB = pluginResult.plugins[b];
            const errDiff = (pB.error_count || 0) - (pA.error_count || 0);
            if (errDiff !== 0) return errDiff;
            return (pA.plugin_name || '').localeCompare(pB.plugin_name || '');
        });
    },

    /**
     * Get plugin categories for grouping
     */
    getPluginCategory(pluginId) {
        if (pluginId.includes('parser')) return 'parser';
        if (pluginId.includes('statistics')) return 'statistics';
        if (pluginId.includes('detector')) return 'detector';
        return 'other';
    }
};
</script>

<style>
.plugin-section {
    background-color: #fafafa;
    transition: box-shadow 0.2s ease;
}

.plugin-section:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.plugin-section .table-responsive {
    font-size: 0.85rem;
}

.plugin-section .badge.bg-light {
    font-weight: normal;
}
</style>
