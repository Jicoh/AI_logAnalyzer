<!-- 插件结果渲染组件 -->

<!-- 统计概览渲染 -->
<template x-if="section.type === 'stats'">
    <div class="stats-section mb-3">
        <h6 class="text-muted mb-2" x-text="section.title"></h6>
        <div class="row">
            <template x-for="item in section.items" :key="item.label">
                <div class="col-md-3 col-sm-6 mb-2">
                    <div class="stat-card p-3 rounded text-center"
                         :class="'bg-' + getSeverityColor(item.severity)">
                        <i class="bi fs-4 mb-1"
                           :class="'bi-' + (item.icon || 'info-circle')"></i>
                        <h4 x-text="item.value"></h4>
                        <small x-text="item.label + (item.unit ? ' (' + item.unit + ')' : '')"></small>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>

<!-- 表格渲染 -->
<template x-if="section.type === 'table'">
    <div class="table-section mb-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0">
                <i class="bi" :class="'bi-' + (section.icon || 'table')"></i>
                <span x-text="section.title"></span>
            </h6>
            <span class="badge" :class="'bg-' + getSeverityColor(section.severity)"
                  x-text="section.rows.length + ' 条'"></span>
        </div>
        <div class="table-responsive" style="max-height: 300px;">
            <table class="table table-sm table-hover">
                <thead class="sticky-top">
                    <tr>
                        <template x-for="col in section.columns" :key="col.key">
                            <th x-text="col.label"
                                :style="col.width ? 'width:' + col.width : ''"></th>
                        </template>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="row in section.rows" :key="$index">
                        <tr :class="'table-' + getSeverityColor(row.severity || 'info')">
                            <template x-for="col in section.columns" :key="col.key">
                                <td>
                                    <span x-text="truncateText(row[col.key], col.truncate || 50)"></span>
                                </td>
                            </template>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</template>

<!-- 时间线渲染 -->
<template x-if="section.type === 'timeline'">
    <div class="timeline-section mb-3">
        <h6 class="text-muted mb-2">
            <i class="bi" :class="'bi-' + (section.icon || 'clock')"></i>
            <span x-text="section.title"></span>
        </h6>
        <div class="timeline">
            <template x-for="event in section.events" :key="$index">
                <div class="timeline-item d-flex align-items-start mb-2">
                    <div class="timeline-marker me-2">
                        <i class="bi" :class="'bi-' + (event.icon || 'circle') + ' text-' + getSeverityColor(event.severity)"></i>
                    </div>
                    <div class="timeline-content">
                        <div class="d-flex justify-content-between">
                            <strong x-text="event.title"></strong>
                            <small class="text-muted" x-text="event.timestamp"></small>
                        </div>
                        <p class="mb-0 small" x-text="event.description"></p>
                        <small x-show="event.detail" class="text-muted" x-text="event.detail"></small>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>

<!-- 卡片渲染 -->
<template x-if="section.type === 'cards'">
    <div class="cards-section mb-3">
        <h6 class="text-muted mb-2">
            <i class="bi" :class="'bi-' + (section.icon || 'layers')"></i>
            <span x-text="section.title"></span>
        </h6>
        <div class="row">
            <template x-for="card in section.cards" :key="$index">
                <div class="col-md-6 mb-2">
                    <div class="card">
                        <div class="card-header"
                             :class="'bg-' + getSeverityColor(card.severity) + ' text-white'">
                            <i class="bi" :class="'bi-' + (card.icon || 'info-circle')"></i>
                            <span x-text="card.title"></span>
                        </div>
                        <div class="card-body">
                            <p class="card-text" x-text="card.content.summary"></p>
                            <template x-if="card.content.metrics">
                                <div class="metrics mt-2">
                                    <template x-for="(value, key) in card.content.metrics" :key="key">
                                        <span class="badge bg-light text-dark me-1">
                                            <span x-text="key"></span>: <span x-text="value"></span>
                                        </span>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>

<!-- 图表渲染 -->
<template x-if="section.type === 'chart'">
    <div class="chart-section mb-3">
        <h6 class="text-muted mb-2">
            <i class="bi" :class="'bi-' + (section.icon || 'chart-bar')"></i>
            <span x-text="section.title"></span>
        </h6>
        <div class="chart-container p-3 bg-light rounded">
            <template x-if="section.chart_type === 'bar'">
                <div class="bar-chart">
                    <template x-for="(label, i) in section.data.labels" :key="i">
                        <div class="d-flex align-items-center mb-1">
                            <span class="me-2" style="width: 80px" x-text="label"></span>
                            <div class="progress flex-grow-1" style="height: 20px;">
                                <div class="progress-bar"
                                     :style="'width:' + getBarWidth(section.data.values, i) + '%'">
                                    <span x-text="section.data.values[i]"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
            <template x-if="section.chart_type === 'pie'">
                <div class="pie-chart text-center">
                    <template x-for="(label, i) in section.data.labels" :key="i">
                        <span class="badge me-1" :class="'bg-' + getChartColor(i)">
                            <span x-text="label"></span>: <span x-text="section.data.values[i]"></span>
                        </span>
                    </template>
                </div>
            </template>
            <template x-if="section.chart_type === 'line'">
                <div class="line-chart">
                    <div class="d-flex">
                        <template x-for="(label, i) in section.data.labels" :key="i">
                            <div class="text-center me-2" style="flex: 1">
                                <div class="bar-vertical bg-primary"
                                     :style="'height:' + getBarWidth(section.data.values, i) + 'px'">
                                </div>
                                <small x-text="label"></small>
                                <br>
                                <span x-text="section.data.values[i]"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>

<!-- 搜索框渲染 -->
<template x-if="section.type === 'search_box'">
    <div class="search-section mb-3">
        <h6 class="text-muted mb-2">
            <i class="bi" :class="'bi-' + (section.icon || 'search')"></i>
            <span x-text="section.title"></span>
        </h6>
        <input type="text" class="form-control mb-2"
               :placeholder="section.placeholder || '搜索...'"
               x-model="searchQuery">
        <div class="search-results">
            <template x-for="item in getFilteredData(section.data, searchQuery, section.search_fields)" :key="$index">
                <div class="p-2 border-bottom">
                    <template x-for="field in section.search_fields" :key="field">
                        <span class="me-2" x-text="item[field]"></span>
                    </template>
                </div>
            </template>
        </div>
    </div>
</template>

<!-- 辅助函数 -->
<script>
function getSeverityColor(severity) {
    const colors = {
        'info': 'secondary',
        'warning': 'warning',
        'error': 'danger',
        'success': 'success'
    };
    return colors[severity] || 'secondary';
}

function truncateText(text, maxLen) {
    if (!text) return '';
    return text.length > maxLen ? text.substring(0, maxLen) + '...' : text;
}

function getBarWidth(values, index) {
    const max = Math.max(...values);
    return max > 0 ? (values[index] / max * 100) : 0;
}

function getChartColor(index) {
    const colors = ['primary', 'success', 'warning', 'danger', 'info', 'secondary'];
    return colors[index % colors.length];
}

function getFilteredData(data, query, fields) {
    if (!query) return data;
    query = query.toLowerCase();
    return data.filter(item => {
        return fields.some(field => {
            const val = item[field];
            return val && val.toString().toLowerCase().includes(query);
        });
    });
}
</script>

<style>
.stat-card {
    border: 1px solid #dee2e6;
    transition: transform 0.2s;
}
.stat-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.timeline-marker {
    min-width: 24px;
}
.timeline-item:not(:last-child) {
    border-bottom: 1px dashed #dee2e6;
    padding-bottom: 8px;
}
</style>
