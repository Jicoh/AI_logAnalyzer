{% extends "base.html" %}

{% block title %}历史记录 - AI Log Analyzer{% endblock %}

{% block content %}
<div class="container-fluid py-4" x-data="historyApp()">
    <h4 class="mb-4"><i class="bi bi-clock-history"></i> 历史记录</h4>

    <!-- Loading State -->
    <div x-show="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2 text-muted">加载中...</p>
    </div>

    <!-- Empty State -->
    <div x-show="!loading && historyList.length === 0" class="card">
        <div class="card-body text-center py-5 text-muted">
            <i class="bi bi-inbox display-4"></i>
            <p class="mt-3">暂无历史记录</p>
        </div>
    </div>

    <!-- History List -->
    <div x-show="!loading && historyList.length > 0">
        <template x-for="record in historyList" :key="record.timestamp">
            <div class="card mb-3">
                <div class="card-body">
                    <div class="row align-items-center">
                        <div class="col-md-4">
                            <h6 class="mb-1">
                                <i class="bi bi-file-earmark-text"></i>
                                <span x-text="record.log_file"></span>
                            </h6>
                            <small class="text-muted" x-text="record.formatted_time"></small>
                        </div>
                        <div class="col-md-4">
                            <div class="d-flex gap-3">
                                <div>
                                    <span class="badge bg-danger">
                                        <i class="bi bi-x-circle"></i>
                                        <span x-text="record.total_errors"></span> 错误
                                    </span>
                                </div>
                                <div>
                                    <span class="badge bg-warning text-dark">
                                        <i class="bi bi-exclamation-triangle"></i>
                                        <span x-text="record.total_warnings"></span> 警告
                                    </span>
                                </div>
                                <div>
                                    <span class="badge bg-info">
                                        <i class="bi bi-puzzle"></i>
                                        <span x-text="record.plugin_count"></span> 插件
                                    </span>
                                </div>
                            </div>
                            <div x-show="record.has_ai_result" class="mt-1">
                                <small class="text-success"><i class="bi bi-robot"></i> AI分析</small>
                            </div>
                        </div>
                        <div class="col-md-4 text-end">
                            <button class="btn btn-outline-primary btn-sm" @click="viewDetail(record.timestamp)">
                                <i class="bi bi-eye"></i> 查看详情
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1" ref="detailModal">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="bi bi-file-earmark-text"></i>
                        分析详情 - <span x-text="detail?.formatted_time || ''"></span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" x-show="detailLoading">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary"></div>
                    </div>
                </div>
                <div class="modal-body" x-show="!detailLoading && detail">
                    <!-- Statistics Overview -->
                    <div class="row mb-4">
                        <div class="col-md-4">
                            <div class="text-center p-3 bg-light rounded">
                                <h3 class="text-danger" x-text="getTotalErrors()"></h3>
                                <small class="text-muted">错误总数</small>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-center p-3 bg-light rounded">
                                <h3 class="text-warning" x-text="getTotalWarnings()"></h3>
                                <small class="text-muted">警告总数</small>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="text-center p-3 bg-light rounded">
                                <h3 class="text-info" x-text="getTotalLines()"></h3>
                                <small class="text-muted">总行数</small>
                            </div>
                        </div>
                    </div>

                    <!-- Plugin Results -->
                    <div x-show="detail?.plugin_result?.plugins">
                        <h6 class="mb-3"><i class="bi bi-puzzle"></i> 插件分析结果</h6>
                        <template x-for="pluginId in getSortedPluginIds()" :key="pluginId">
                            <div class="plugin-section mb-3 border rounded p-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h6 class="mb-0">
                                        <i class="bi bi-puzzle"></i>
                                        <span x-text="detail.plugin_result.plugins[pluginId]?.plugin_name"></span>
                                    </h6>
                                    <div>
                                        <span class="badge bg-danger me-1" x-show="detail.plugin_result.plugins[pluginId]?.error_count > 0">
                                            <i class="bi bi-x-circle"></i>
                                            <span x-text="detail.plugin_result.plugins[pluginId]?.error_count"></span>
                                        </span>
                                        <span class="badge bg-warning me-1" x-show="detail.plugin_result.plugins[pluginId]?.warning_count > 0">
                                            <i class="bi bi-exclamation-triangle"></i>
                                            <span x-text="detail.plugin_result.plugins[pluginId]?.warning_count"></span>
                                        </span>
                                    </div>
                                </div>

                                <!-- Plugin statistics -->
                                <div x-show="Object.keys(detail.plugin_result.plugins[pluginId]?.statistics || {}).length > 0" class="mb-2">
                                    <small class="text-muted">统计信息:</small>
                                    <div class="d-flex flex-wrap gap-2 mt-1">
                                        <template x-for="(value, key) in detail.plugin_result.plugins[pluginId]?.statistics" :key="key">
                                            <span class="badge bg-light text-dark border">
                                                <span x-text="formatStatKey(key)"></span>:
                                                <span x-text="formatStatValue(value)"></span>
                                            </span>
                                        </template>
                                    </div>
                                </div>

                                <!-- Errors -->
                                <div x-show="detail.plugin_result.plugins[pluginId]?.errors?.length > 0" class="mt-2">
                                    <small class="text-danger"><i class="bi bi-x-circle"></i> 错误详情</small>
                                    <div class="table-responsive" style="max-height: 150px; overflow-y: auto;">
                                        <table class="table table-sm table-hover small">
                                            <thead class="table-light sticky-top">
                                                <tr>
                                                    <th>行号</th>
                                                    <th>时间</th>
                                                    <th>组件</th>
                                                    <th>消息</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="err in detail.plugin_result.plugins[pluginId]?.errors" :key="err.line_number + '-' + $index">
                                                    <tr>
                                                        <td><code x-text="err.line_number"></code></td>
                                                        <td x-text="err.timestamp || '-'"></td>
                                                        <td x-text="err.component || '-'"></td>
                                                        <td><small x-text="truncateText(err.message, 50)"></small></td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <!-- Warnings -->
                                <div x-show="detail.plugin_result.plugins[pluginId]?.warnings?.length > 0" class="mt-2">
                                    <small class="text-warning"><i class="bi bi-exclamation-triangle"></i> 警告详情</small>
                                    <div class="table-responsive" style="max-height: 150px; overflow-y: auto;">
                                        <table class="table table-sm table-hover small">
                                            <thead class="table-light sticky-top">
                                                <tr>
                                                    <th>行号</th>
                                                    <th>时间</th>
                                                    <th>组件</th>
                                                    <th>消息</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template x-for="warn in detail.plugin_result.plugins[pluginId]?.warnings" :key="warn.line_number + '-' + $index">
                                                    <tr>
                                                        <td><code x-text="warn.line_number"></code></td>
                                                        <td x-text="warn.timestamp || '-'"></td>
                                                        <td x-text="warn.component || '-'"></td>
                                                        <td><small x-text="truncateText(warn.message, 50)"></small></td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- AI Result -->
                    <div x-show="detail?.ai_result" class="mt-4">
                        <h6 class="mb-3"><i class="bi bi-robot"></i> AI 分析结果</h6>
                        <div class="card bg-light">
                            <div class="card-body">
                                <div class="ai-result" x-html="formatAiResult(detail?.ai_result)"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function historyApp() {
    return {
        loading: true,
        historyList: [],
        detail: null,
        detailLoading: false,
        modal: null,

        init() {
            this.loadHistory();
            this.modal = new bootstrap.Modal(document.getElementById('detailModal'));
        },

        async loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                if (data.success) {
                    this.historyList = data.data;
                }
            } catch (error) {
                console.error('Failed to load history:', error);
            } finally {
                this.loading = false;
            }
        },

        async viewDetail(timestamp) {
            this.detail = null;
            this.detailLoading = true;
            this.modal.show();

            try {
                const response = await fetch(`/api/history/${timestamp}`);
                const data = await response.json();
                if (data.success) {
                    this.detail = data.data;
                }
            } catch (error) {
                console.error('Failed to load detail:', error);
            } finally {
                this.detailLoading = false;
            }
        },

        getTotalErrors() {
            if (!this.detail?.plugin_result?.plugins) return 0;
            return Object.values(this.detail.plugin_result.plugins).reduce((sum, p) => sum + (p.error_count || 0), 0);
        },

        getTotalWarnings() {
            if (!this.detail?.plugin_result?.plugins) return 0;
            return Object.values(this.detail.plugin_result.plugins).reduce((sum, p) => sum + (p.warning_count || 0), 0);
        },

        getTotalLines() {
            if (!this.detail?.plugin_result?.plugins) return 0;
            let maxLines = 0;
            Object.values(this.detail.plugin_result.plugins).forEach(p => {
                if (p.statistics?.total_lines) {
                    maxLines = Math.max(maxLines, p.statistics.total_lines);
                }
            });
            return maxLines;
        },

        getSortedPluginIds() {
            if (!this.detail?.plugin_result?.plugins) return [];
            return Object.keys(this.detail.plugin_result.plugins).sort((a, b) => {
                const pA = this.detail.plugin_result.plugins[a];
                const pB = this.detail.plugin_result.plugins[b];
                const errDiff = (pB.error_count || 0) - (pA.error_count || 0);
                if (errDiff !== 0) return errDiff;
                return (pA.plugin_name || '').localeCompare(pB.plugin_name || '');
            });
        },

        formatStatKey(key) {
            const keyMap = {
                'total_lines': '总行数',
                'error_lines': '错误行数',
                'warning_lines': '警告行数',
                'info_lines': '信息行数',
                'debug_lines': '调试行数',
                'unique_components': '唯一组件数',
                'time_range': '时间范围',
                'file_size': '文件大小',
                'total_size_bytes': '文件大小(字节)',
                'total_size_human': '文件大小',
                'avg_line_length': '平均行长',
                'time_distribution': '时间分布',
                'component_activity': '组件活动',
                'analysis_type': '分析类型',
                'error_rate': '错误率',
                'warning_rate': '警告率',
                'level_distribution': '日志级别分布',
                'top_components': '主要组件'
            };
            return keyMap[key] || key;
        },

        formatStatValue(value) {
            if (typeof value === 'number') {
                return value.toLocaleString();
            }
            if (typeof value === 'object') {
                return JSON.stringify(value);
            }
            return String(value);
        },

        truncateText(text, maxLength = 50) {
            if (!text) return '';
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        },

        formatAiResult(text) {
            if (!text) return '';
            return text
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>')
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>');
        }
    };
}
</script>

<style>
.ai-result {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.6;
    white-space: pre-wrap;
}
.ai-result pre {
    background: #fff;
    padding: 1rem;
    border-radius: 0.25rem;
    overflow-x: auto;
}
.ai-result code {
    background: #fff;
    padding: 0.2rem 0.4rem;
    border-radius: 0.25rem;
}
.plugin-section {
    background-color: #fafafa;
    transition: box-shadow 0.2s ease;
}
.plugin-section:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.plugin-section .table-responsive {
    font-size: 0.85rem;
}
</style>
{% endblock %}
