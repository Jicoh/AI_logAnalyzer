{% extends "base.html" %}

{% block title %}历史记录 - AI Log Analyzer{% endblock %}

{% block content %}
<div class="container-fluid py-4" x-data="historyApp()">
    <h4 class="mb-4"><i class="bi bi-clock-history"></i> 历史记录</h4>

    <!-- Loading State -->
    <div x-show="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2 text-muted">加载中...</p>
    </div>

    <!-- Empty State -->
    <div x-show="!loading && historyList.length === 0" class="card">
        <div class="card-body text-center py-5 text-muted">
            <i class="bi bi-inbox display-4"></i>
            <p class="mt-3">暂无历史记录</p>
        </div>
    </div>

    <!-- History List -->
    <div x-show="!loading && historyList.length > 0">
        <template x-for="record in historyList" :key="record.folder_name">
            <div class="card mb-3">
                <div class="card-body">
                    <!-- 单文件记录头部 -->
                    <template x-if="!record.is_batch">
                        <div class="row align-items-center">
                            <div class="col-md-4">
                                <h6 class="mb-1">
                                    <i class="bi bi-file-text"></i>
                                    <span x-text="record.folder_name"></span>
                                </h6>
                                <small class="text-muted" x-text="record.formatted_time"></small>
                            </div>
                            <div class="col-md-4">
                                <div class="d-flex gap-2">
                                    <span class="badge bg-danger">
                                        <i class="bi bi-x-circle"></i>
                                        <span x-text="record.total_errors"></span> 错误
                                    </span>
                                    <span class="badge bg-warning text-dark">
                                        <i class="bi bi-exclamation-triangle"></i>
                                        <span x-text="record.total_warnings"></span> 警告
                                    </span>
                                    <span class="badge bg-info">
                                        <i class="bi bi-puzzle"></i>
                                        <span x-text="record.plugin_count"></span> 插件
                                    </span>
                                    <span class="badge bg-success" x-show="record.has_ai_result">
                                        <i class="bi bi-robot"></i> AI
                                    </span>
                                </div>
                            </div>
                            <div class="col-md-4 text-end">
                                <button class="btn btn-outline-primary btn-sm" @click="viewDetail(record.folder_name)">
                                    <i class="bi bi-eye"></i> 查看详情
                                </button>
                            </div>
                        </div>
                    </template>

                    <!-- 批量记录头部 -->
                    <template x-if="record.is_batch">
                        <div>
                            <div class="row align-items-center">
                                <div class="col-md-5">
                                    <h6 class="mb-1">
                                        <i class="bi bi-folder-fill"></i>
                                        <span x-text="record.folder_name"></span>
                                        <button class="btn btn-sm btn-link ps-1" @click="toggleBatchExpand(record.folder_name)">
                                            <i class="bi" :class="batchExpanded[record.folder_name] ? 'bi-chevron-down' : 'bi-chevron-right'"></i>
                                        </button>
                                    </h6>
                                    <small class="text-muted" x-text="record.formatted_time"></small>
                                    <small class="text-muted ms-2">(共 <span x-text="record.total_files"></span> 文件)</small>
                                </div>
                                <div class="col-md-4">
                                    <span class="badge bg-danger me-1" x-show="record.total_errors > 0">
                                        <span x-text="record.total_errors"></span> 错误
                                    </span>
                                    <span class="badge bg-warning text-dark" x-show="record.total_warnings > 0">
                                        <span x-text="record.total_warnings"></span> 警告
                                    </span>
                                </div>
                            </div>

                            <!-- 展开的子文件列表 -->
                            <div x-show="batchExpanded[record.folder_name]" class="mt-3 border-top pt-3">
                                <template x-for="file in record.files" :key="file.filename">
                                    <div class="row align-items-center mb-2 py-1 bg-light rounded">
                                        <div class="col-md-5">
                                            <i class="bi bi-file-text text-muted"></i>
                                            <span x-text="file.filename" class="ms-1"></span>
                                        </div>
                                        <div class="col-md-4">
                                            <span class="badge bg-danger me-1" x-show="file.errors > 0">
                                                <i class="bi bi-x-circle"></i>
                                                <span x-text="file.errors"></span> 错误
                                            </span>
                                            <span class="badge bg-warning text-dark me-1" x-show="file.warnings > 0">
                                                <i class="bi bi-exclamation-triangle"></i>
                                                <span x-text="file.warnings"></span> 警告
                                            </span>
                                            <span class="badge bg-info me-1">
                                                <i class="bi bi-puzzle"></i>
                                                <span x-text="file.plugin_count"></span> 插件
                                            </span>
                                            <span class="badge bg-success" x-show="file.has_ai_result">
                                                <i class="bi bi-robot"></i> AI
                                            </span>
                                        </div>
                                        <div class="col-md-3 text-end">
                                            <button class="btn btn-outline-primary btn-sm"
                                                    @click="viewBatchFileDetail(record.folder_name, file.output_dir)">
                                                <i class="bi bi-eye"></i> 查看详情
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1" ref="detailModal"
         :class="{ 'show': detailFullscreen }" :style="detailFullscreen ? 'display: block; opacity: 1;' : ''">
        <div class="modal-dialog modal-xl modal-dialog-scrollable"
             :class="{ 'modal-fullscreen': detailFullscreen }">
            <div class="modal-content" :style="detailFullscreen ? 'height: 100vh; border-radius: 0;' : ''">
                <div class="modal-header" :style="detailFullscreen ? 'padding: 0.75rem 1rem;' : ''">
                    <h5 class="modal-title">
                        <i class="bi bi-folder"></i>
                        分析详情 - <span x-text="detail?.folder_name || ''"></span>
                    </h5>
                    <div class="d-flex align-items-center gap-2">
                        <button type="button" class="btn btn-outline-secondary btn-sm" @click="toggleDetailFullscreen()">
                            <i class="bi" :class="detailFullscreen ? 'bi-fullscreen-exit' : 'bi-arrows-fullscreen'"></i>
                        </button>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                </div>
                <div class="modal-body" x-show="detailLoading">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary"></div>
                    </div>
                </div>
                <div class="modal-body" x-show="!detailLoading && detail" :style="detailFullscreen ? 'padding: 0; height: calc(100vh - 60px);' : 'padding: 0;'">
                    <!-- Plugin Results iframe -->
                    <div x-show="detail?.html_path" class="plugin-result-container"
                         :style="detailFullscreen ? 'height: 60%; border-bottom: 1px solid #dee2e6;' : ''">
                        <iframe :src="detail?.html_path ? '/api/plugin-result/html/' + detail.html_path : ''"
                                :style="detailFullscreen ? 'width: 100%; height: 100%; border: none;' : 'width: 100%; height: 600px; border: none;'"></iframe>
                    </div>

                    <!-- AI Result -->
                    <div x-show="detail?.ai_result" :class="detailFullscreen ? 'p-3 h-40 overflow-auto' : 'mt-3 p-3'">
                        <h6 class="mb-3"><i class="bi bi-robot"></i> AI 分析结果</h6>
                        <div class="card bg-light">
                            <div class="card-body">
                                <div class="ai-result" x-html="formatAiResult(detail?.ai_result)"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" x-show="!detailFullscreen">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function historyApp() {
    return {
        loading: true,
        historyList: [],
        detail: null,
        detailLoading: false,
        modal: null,
        batchExpanded: {},
        detailFullscreen: false,

        init() {
            this.loadHistory();
            this.modal = new bootstrap.Modal(document.getElementById('detailModal'));
        },

        async loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                if (data.success) {
                    this.historyList = data.data;
                }
            } catch (error) {
                console.error('Failed to load history:', error);
            } finally {
                this.loading = false;
            }
        },

        toggleBatchExpand(folderName) {
            this.batchExpanded[folderName] = !this.batchExpanded[folderName];
        },

        async viewDetail(folderName) {
            this.detail = null;
            this.detailLoading = true;
            this.detailFullscreen = false;
            this.modal.show();

            try {
                const response = await fetch(`/api/history/${folderName}`);
                const data = await response.json();
                if (data.success) {
                    this.detail = data.data;
                }
            } catch (error) {
                console.error('Failed to load detail:', error);
            } finally {
                this.detailLoading = false;
            }
        },

        async viewBatchFileDetail(batchFolder, fileOutputDir) {
            this.detail = null;
            this.detailLoading = true;
            this.detailFullscreen = false;
            this.modal.show();

            try {
                const response = await fetch(`/api/history/batch/${batchFolder}/${fileOutputDir}`);
                const data = await response.json();
                if (data.success) {
                    this.detail = data.data;
                }
            } catch (error) {
                console.error('Failed to load batch file detail:', error);
            } finally {
                this.detailLoading = false;
            }
        },

        toggleDetailFullscreen() {
            this.detailFullscreen = !this.detailFullscreen;
            if (this.detailFullscreen) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        },

        formatAiResult(text) {
            if (!text) return '';
            return text
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>')
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code class="language-$1">$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>');
        }
    };
}
</script>

<style>
.ai-result {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    line-height: 1.6;
    white-space: pre-wrap;
}
.ai-result pre {
    background: #fff;
    padding: 1rem;
    border-radius: 0.25rem;
    overflow-x: auto;
}
.ai-result code {
    background: #fff;
    padding: 0.2rem 0.4rem;
    border-radius: 0.25rem;
}
.plugin-result-container {
    border-bottom: 1px solid #dee2e6;
}
</style>
{% endblock %}
